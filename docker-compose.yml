services:
  uzchess:
    build: .
    env_file:
      - ..env
    ports:
      - "3004:3004"
    restart: always
    depends_on:
       postgres:
       condition: service_healthy

  postgres:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: uzchess
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  postgres_data:
